<!DOCTYPE html>
<html lang ="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name=" viewport" content = "width= device-width", initial-scale="1.0">
    <title>Meu Dashboard Financeiro</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Controle de Gasto</h1>
    </header>
    <main>
        <section id="balance">
            <h2>Saldo Atual: R$ 0,00 </h2>
        </section>

        <section id="form">
            <h3>Nova Transação</h3>
            <input type="text" placeholder="Ex: Aluguel">
            
            
            <select id="tipo-transacao">
                <option value="entrada">Entrada (+)</option>
                <option value="saida">Saída (-)</option>
            </select>

            <input type="number" placeholder="Valor (R$)">
            <button>Registrar</button>
        </section>
    </main>

    <section id="historico">
            <h3>Extrato</h3>
            <ul id="lista-transacoes">
                </ul>
        </section>
        
    <script src="script.js"></script>

    
</body>
</html>
